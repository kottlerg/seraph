name: build-test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: build-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-23
          components: rust-src,rustfmt,clippy,llvm-tools

      - name: Cache cargo and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: host-tests

      - name: cargo xtask test
        run: cargo xtask test

  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, riscv64]
        profile: [debug, release]
        # One harness per cell: each cell builds once, stages exactly one
        # recipe (or swaps boot.conf for ktest), then runs once. Avoids
        # back-to-back fatfs/sysroot state accumulation across harnesses
        # and lets a failing tier surface as a single named cell. The
        # usertest cell additionally runs the terminal interactive test as
        # a second boot — it needs the QMP `test-terminal` runner (not
        # run-parallel), and colocating it (both programs-surface) avoids a
        # matrix dimension that would multiply with every arch. See
        # docs/testing.md.
        tester: [svctest, usertest, ktest]
    steps:
      - uses: actions/checkout@v6

      - name: Install QEMU and firmware
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-x86 \
            qemu-system-misc \
            ovmf \
            qemu-efi-riscv64

      - name: Log QEMU versions
        # Seraph requires QEMU ≥ 8.0 (RISC-V V extension support). The
        # explicit `-cpu rv64,v=true,...` invocation in `xtask/src/qemu.rs`
        # works on every supported version; `-cpu rva23s64` becomes usable
        # at QEMU ≥ 9.1 and is the preferred form once CI runners ship it.
        run: |
          qemu-system-x86_64 --version | head -n1
          qemu-system-riscv64 --version | head -n1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-23
          components: rust-src,rustfmt,clippy,llvm-tools

      - name: Cache cargo and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: validate-${{ matrix.arch }}-${{ matrix.profile }}

      - name: Build (${{ matrix.arch }}, ${{ matrix.profile }})
        run: |
          if [ "${{ matrix.profile }}" = "release" ]; then
            cargo xtask build --arch ${{ matrix.arch }} --release
          else
            cargo xtask build --arch ${{ matrix.arch }}
          fi

      - name: Stage ${{ matrix.tester }} and repack disk
        # Recipe staging: svctest and usertest live in
        # `sysroot/config/svcmgr/tests/` (svcmgr does not scan that
        # directory); cp into services/ to enable. `cargo xtask mkdisk`
        # re-mirrors rootfs and repacks the FAT image without invoking
        # cargo. ktest swaps the bundle's `init` entry via
        # `cargo xtask compose-bundle --harness ktest`, which repacks
        # the disk image as part of the compose step.
        #
        # The svctest cell also co-stages crasher (the restart-path
        # fixture): crasher is non-shutdown, so it shares the boot with
        # svctest without racing pwrmgr shutdown; its bounded faults
        # finish long before svctest's terminal marker. This is the only
        # automated boot crasher runs in.
        #
        # The functional harness boots also drop the autostarted `terminal`
        # (a user-facing program, not part of the services/programs substrate
        # under test) so the boot is controlled. `--repack-only` makes the
        # removal stick: a normal repack re-mirrors rootfs, which would restore
        # terminal.svc. The terminal is exercised in its own boot
        # (test-terminal, below).
        run: |
          case "${{ matrix.tester }}" in
            svctest)
              cp sysroot/config/svcmgr/tests/svctest.svc \
                 sysroot/config/svcmgr/services/
              cp sysroot/config/svcmgr/tests/crasher.svc \
                 sysroot/config/svcmgr/services/
              rm -f sysroot/config/svcmgr/services/terminal.svc
              cargo xtask mkdisk --arch ${{ matrix.arch }} --repack-only
              ;;
            usertest)
              cp sysroot/config/svcmgr/tests/usertest.svc \
                 sysroot/config/svcmgr/services/
              rm -f sysroot/config/svcmgr/services/terminal.svc
              cargo xtask mkdisk --arch ${{ matrix.arch }} --repack-only
              ;;
            ktest)
              cargo xtask compose-bundle --arch ${{ matrix.arch }} --harness ktest
              ;;
          esac

      - name: Run ${{ matrix.tester }}
        run: |
          cargo xtask run-parallel \
            --arch ${{ matrix.arch }} \
            --parallel 1 --runs 1 --timeout 180
          if [ "${{ matrix.tester }}" = "ktest" ]; then
            # Extra boots: the KASLR randomization test (#252). Boots the
            # ktest bundle already composed above twice and asserts the
            # image slide and direct-map base differ, then asserts the
            # --no-kaslr knob yields the deterministic layout. Host-side
            # (it must observe the layout differing across separate boots),
            # so it cannot ride run-parallel; both arches.
            cargo xtask test-kaslr --arch ${{ matrix.arch }}
          fi
          if [ "${{ matrix.tester }}" = "usertest" ]; then
            # Second boot: the terminal interactive test (keyboard input
            # through the terminal). It needs the QMP `test-terminal` runner
            # (host-side key injection) and so cannot ride run-parallel;
            # colocated here (both programs-surface) to avoid a separate
            # matrix dimension. Drop usertest.svc and repack with the rootfs
            # re-mirror, which restores terminal.svc — yielding exactly the
            # default interactive boot that `cargo xtask run` produces.
            rm -f sysroot/config/svcmgr/services/usertest.svc
            cargo xtask mkdisk --arch ${{ matrix.arch }}
            cargo xtask test-terminal --arch ${{ matrix.arch }}
            if [ "${{ matrix.arch }}" = "x86_64" ]; then
              # Third boot pair: the VMGENID snapshot-resume test (#395).
              # x86_64 only (QEMU's riscv64 virt machine has no VMGENID);
              # host-side QMP migrate/restore, so it cannot ride
              # run-parallel. Reuses the default interactive boot the
              # test-terminal repack just restored.
              cargo xtask test-vmgenid
            fi
          fi

      - name: Upload run-parallel logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: run-parallel-${{ matrix.arch }}-${{ matrix.profile }}-${{ matrix.tester }}
          path: target/xtask/run-parallel/**/*.log
          if-no-files-found: ignore
