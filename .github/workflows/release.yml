name: release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  preflight:
    # Fail-fast gate: catches a stale workspace version or missing/malformed
    # release notes in seconds, before the expensive build matrix runs.
    # Guard workflow_dispatch from running against a branch ref — release
    # artifacts must be anchored to a tagged commit so the asset filenames
    # match the version they encode.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify workspace version matches tag
        run: |
          TAG="${{ github.ref_name }}"
          # The root Cargo.toml is the workspace manifest; its only top-level
          # `version =` line is [workspace.package] version.
          WS_VERSION="$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -n1)"
          if [ "v${WS_VERSION}" != "${TAG}" ]; then
            echo "::error::Tag ${TAG} does not match [workspace.package] version ${WS_VERSION}." >&2
            echo "Bump the workspace version in Cargo.toml before tagging." >&2
            exit 1
          fi

      - name: Verify release notes exist and follow TEMPLATE.md
        run: |
          TAG="${{ github.ref_name }}"
          NOTES="docs/releases/${TAG}.md"
          if [ ! -f "${NOTES}" ]; then
            echo "::error::Release notes missing: ${NOTES}" >&2
            echo "Copy docs/releases/TEMPLATE.md and commit it before tagging ${TAG}." >&2
            exit 1
          fi
          # -qxF: fixed-string whole-line matches, so a body bullet merely
          # quoting a heading cannot satisfy the structure check.
          if ! grep -qxF "# Seraph ${TAG}" "${NOTES}"; then
            echo "::error::${NOTES}: title must be '# Seraph ${TAG}' per TEMPLATE.md" >&2
            exit 1
          fi
          for h in "## Highlights" "## Components Shipped" "## ABI and Protocol Versions" \
                   "## Breaking Changes" "## Known Issues" "## Verification" "## Validation"; do
            if ! grep -qxF "$h" "${NOTES}"; then
              echo "::error::${NOTES} missing TEMPLATE.md section: $h" >&2
              exit 1
            fi
          done

  build-image:
    # Guard workflow_dispatch from running against a branch ref — release
    # artifacts must be anchored to a tagged commit so the asset filenames
    # match the version they encode.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: preflight
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, riscv64]
    steps:
      - uses: actions/checkout@v6

      - name: Install QEMU, firmware, and zstd
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-x86 \
            qemu-system-misc \
            ovmf \
            qemu-efi-riscv64 \
            zstd

      - name: Log QEMU versions
        run: |
          qemu-system-x86_64 --version | head -n1
          qemu-system-riscv64 --version | head -n1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-23
          components: rust-src,rustfmt,clippy,llvm-tools

      - name: Cache cargo and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.arch }}

      - name: Build release (${{ matrix.arch }})
        run: cargo xtask build --arch ${{ matrix.arch }} --release

      - name: Compress and checksum disk image
        run: |
          TAG="${{ github.ref_name }}"
          ARCH="${{ matrix.arch }}"
          OUT="seraph-${TAG}-${ARCH}.img.zst"
          zstd -19 -T0 disk.img -o "${OUT}"
          sha256sum "${OUT}" > "${OUT}.sha256"

      - name: Upload arch artifact
        uses: actions/upload-artifact@v7
        with:
          name: image-${{ matrix.arch }}
          path: |
            seraph-*.img.zst
            seraph-*.img.zst.sha256
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Assemble SHA256SUMS
        run: |
          cd artifacts
          cat *.img.zst.sha256 | sort > SHA256SUMS
          rm -f *.img.zst.sha256
          ls -la

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          NOTES_FILE="docs/releases/${TAG}.md"
          if [ ! -f "${NOTES_FILE}" ]; then
            echo "::error::Release notes missing: ${NOTES_FILE}" >&2
            echo "Create and commit ${NOTES_FILE} before tagging ${TAG}." >&2
            exit 1
          fi
          gh release create "${TAG}" --draft \
            --title "Seraph ${TAG}" \
            --notes-file "${NOTES_FILE}" \
            artifacts/seraph-*.img.zst \
            artifacts/SHA256SUMS
