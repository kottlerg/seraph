# Seraph bootloader configuration
path=\EFI\seraph
kernel=kernel
init=init
cmdline=root=UUID=12345678-abcd-ef01-2345-6789abcdef01
modules=procmgr, devmgr, vfsd, virtio-blk, fatfs, memmgr

# ktest configuration (uncomment init=ktest and a cmdline below to use)
#init=ktest
#cmdline=ktest.shutdown=always ktest.timeout=3
#cmdline=ktest.filter=unit,integration,stress,bench ktest.shutdown=always ktest.timeout=0
