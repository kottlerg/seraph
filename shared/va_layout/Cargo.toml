[package]
name = "va_layout"
version = "0.1.0"
edition = "2024"
publish = false

# no_std: centralised userspace VA constants. Every hardcoded VA in
# userspace lives here, with compile-time non-overlap assertions.
[lib]
test = false
doctest = false

[dependencies]
# When std lists this crate as a dep, build-std activates
# `rustc-dep-of-std`; the `rustc-std-workspace-core` facade then
# substitutes for `core` during build-std. Matches the hermit-abi /
# fortanix-sgx-abi pattern used upstream.
rustc-std-workspace-core = { version = "1.0.1", optional = true }

[features]
rustc-dep-of-std = ["rustc-std-workspace-core"]

[lints]
workspace = true
